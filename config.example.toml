# optimizarr configuration.
# Copy to config.toml and mount it at /config/config.toml in the container.
# Secrets and URLs live in the environment (.env), NOT here.
#
# This file is layered ON TOP of the built-in defaults (optimizarr/defaults.toml): you only
# need to set what you want to change. Tables (incl. presets) deep-merge; lists replace.
# Most values below mirror the built-in defaults; a few are pre-set as common starting
# overrides (optimizer.enabled = true, min_age_days = 30) so this config is runnable as-is.

# Log only, never grab or unmonitor. Applies to both features.
dry_run = false

# ===== Unmonitor: cron-scheduled, unmonitor items N days after release =====
[unmonitor]
enabled = true
cron_schedule = "0 4 * * *"
run_on_start = true

[unmonitor.radarr]
days = 30
# One of: digitalRelease, physicalRelease, inCinemas, releaseDate, dateAdded
release_type = "digitalRelease"
require_cutoff_met = true

[unmonitor.sonarr]
days = 30
# One of: airDateUtc, dateAdded
release_type = "airDateUtc"
require_cutoff_met = true

# ===== Optimizer: interval-driven worker that re-picks better releases =====
[optimizer]
enabled = true
# Only process when the download queue has <= queue_max items (0 = empty only).
queue_max = 5
# "random" or "ordered"
pick_order = "random"
# Short loop: seconds between processing items — also the wait when the queue is full or
# the list is exhausted, and the settle delay so a grab surfaces before the next read. Min 10.
process_interval_seconds = 15
# Long loop: how often to re-fetch the full library list from Radarr/Sonarr.
list_refresh_minutes = 15
# A satisfied item (HOLD: nothing better found) is reconsidered this many days later.
reevaluate_after_days = 30

# Per-app options:
#   enabled                    toggle this app from the optimizer (default true).
#   min_age_days               age threshold applied to every date in release_type.
#   release_type               LIST of date fields the age gate checks; ALL must be at least
#                              min_age_days old. The shipped two-gate default avoids touching
#                              freshly-released items (still being chased by Radarr/Sonarr)
#                              AND freshly-imported files. Missing date -> gate stays closed.
#                              Radarr values: digitalRelease, physicalRelease, inCinemas,
#                              releaseDate, dateAdded. Sonarr values: airDateUtc, dateAdded.
#   allow_size_increase        if false, drop candidates bigger than the current file
#                              (blocks 1080p -> 2160p upgrades, those are always bigger).
#   allow_quality_downgrade    if false, drop candidates with a lower customFormatScore than
#                              the current file. WARNING: turning this off neutralizes
#                              size-leaning presets (Compact/Efficient), whose whole point is
#                              picking a slightly-lower-score release for a much smaller size.
#   ignore_completed_in_queue  if true, queue items waiting for manual import don't count
#                              toward queue_max — only actively downloading/queued items do.
#                              Prevents stuck imports from blocking the optimizer.
#   auto_import_downgrades     if true, on each tick the worker scans the queue and force-
#                              imports completed items rejected solely for score regression
#                              ("Not an upgrade"). Other rejection categories (executable,
#                              sample, mismatch) are left untouched. Defaults: true on both.
[optimizer.radarr]
enabled = true
min_age_days = 30
release_type = ["digitalRelease", "dateAdded"]
allow_size_increase = true
allow_quality_downgrade = true
ignore_completed_in_queue = true
auto_import_downgrades = true

[optimizer.sonarr]
enabled = true
min_age_days = 30
release_type = ["airDateUtc", "dateAdded"]
allow_size_increase = true
allow_quality_downgrade = true
ignore_completed_in_queue = true
auto_import_downgrades = true

# ===== TOPSIS =====
# You usually don't need this section at all — the shipped presets are sensible. Set values
# here only to override. Score normalizes on a fixed [anti_ideal, ideal] scale; resolution
# toward the profile's max-allowed resolution; size is a per-preset TENT {floor, target, bloat}
# peaking at *target* (the GB/h that preset is designed to pick). floor also drops
# fake/low-bitrate releases. When target == floor the tent degenerates to a cost curve
# (smaller wins) — that's how Compact behaves.
[optimizer.topsis]
score_ideal = 1000000
score_anti_ideal = 0
resolution_ideal = 2160       # fallback target when a profile exposes no allowed resolution
resolution_anti_ideal = 480
# Inclusion: keep the top score cluster down to the first relative drop greater than this.
score_gap = 0.20
# Swap only when the pick's closeness beats the current file's by at least this much.
min_closeness_gain = 0.02
# Preset used when a profile name matches no preset by keyword.
default_preset = "Efficient"

# --- Presets (weights sum to 1.0 + a per-resolution size tent {floor, target, bloat}) ---
# A Radarr/Sonarr profile attaches to the preset whose name is a case-insensitive substring of
# the profile name (e.g. "2160p Quality" -> Quality; "2160p Remux" -> Remux). Resolution weight
# is kept low on purpose — Profilarr already folds resolution into the score. The bloat point is
# what makes a preset remux- vs efficient-friendly. Override a shipped preset by redefining it:
#
# [optimizer.topsis.presets.Quality]
# score = 0.65
# resolution = 0.15
# size = 0.20
# size_by_resolution = { "1080" = { floor = 1.5, target = 5, bloat = 20 }, "2160" = { floor = 3, target = 10, bloat = 50 } }
#
# Shipped presets (see defaults.toml): Remux, Quality, Balanced, Efficient, Compact.

# --- Per-profile-name overrides ---
# Pin an exact profile to a preset, or give it explicit weights / size curve:
#
# [optimizer.topsis.profiles."2160p Remux"]
# preset = "Remux"
#
# [optimizer.topsis.profiles."My Custom 1080p"]
# weights = { score = 0.5, resolution = 0.1, size = 0.4 }
# size_by_resolution = { "1080" = { floor = 1.0, target = 4.0, bloat = 20 } }
