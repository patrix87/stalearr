# optimizarr configuration.
# Copy to config.toml and mount it at /config/config.toml in the container.
# Secrets and URLs live in the environment (.env), NOT here.

# Log only, never grab or unmonitor. Applies to both features.
dry_run = false

# ===== Unmonitor: cron-scheduled, unmonitor items N days after release =====
[unmonitor]
enabled = true
cron_schedule = "0 4 * * *"
run_on_start = true

[unmonitor.radarr]
days = 30
# One of: digitalRelease, physicalRelease, inCinemas, releaseDate, dateAdded
release_type = "digitalRelease"
require_cutoff_met = true

[unmonitor.sonarr]
days = 30
# One of: airDateUtc, dateAdded
release_type = "airDateUtc"
require_cutoff_met = true

# ===== Optimizer: interval-driven worker that re-picks better releases =====
[optimizer]
enabled = true
apps = ["radarr", "sonarr"]
# Only process when the download queue has <= queue_max items (0 = empty only).
queue_max = 5
# "random" or "ordered"
pick_order = "random"
# Short loop: seconds between processing items — also the wait when the queue is full or
# the list is exhausted, and the settle delay so a grab surfaces before the next read.
# Minimum 10.
process_interval_seconds = 15
# Long loop: how often to re-fetch the full library list from Radarr/Sonarr.
list_refresh_minutes = 15
# A satisfied item (HOLD: nothing better found) is reconsidered this many days
# later, in case better releases have since appeared. Set very high to effectively
# never re-evaluate satisfied items.
reevaluate_after_days = 30

# Per-app age gate: only consider items at least min_age_days past their release
# date (same date fields as the unmonitor feature). min_age_days = 0 disables the
# gate. release_type selects the date field used to measure age.
[optimizer.radarr]
min_age_days = 30
# One of: digitalRelease, physicalRelease, inCinemas, releaseDate, dateAdded
release_type = "digitalRelease"

[optimizer.sonarr]
min_age_days = 30
# One of: airDateUtc, dateAdded
release_type = "airDateUtc"

[optimizer.topsis]
score_ideal = 1000000
resolution_ideal = 2160
score_anti_ideal = 0
resolution_anti_ideal = 480
# Adaptive score floor: prefer >= preferred; never go more than drop_from_top below the pool top.
score_floor_preferred = 900000
score_drop_from_top = 250000
# Path A (shrink): closeness gain AND size savings both required.
min_closeness_gain = 0.05
min_size_savings_gb = 0.5
# Path B (upgrade): large closeness gain, size increase tolerated.
allow_upgrades = true
min_closeness_gain_for_upgrade = 0.10

# Default TOPSIS weights (must sum to 1.0).
[optimizer.topsis.weights]
score = 0.40
resolution = 0.25
size = 0.35

# Per-profile weight overrides (each must sum to 1.0). Quality biases toward score.
[optimizer.topsis.weights_by_profile."2160p Quality"]
score = 0.60
resolution = 0.15
size = 0.25

# GB/h sanity floor per resolution — drops obvious fake/low-bitrate encodes.
[optimizer.topsis.sanity_gbh_floor_by_resolution]
"480" = 0.2
"720" = 0.4
"1080" = 0.8
"2160" = 1.5

# Per-resolution size envelope [target, bloat] in GB/h, used for off-profile candidates.
[optimizer.topsis.size_envelope_by_resolution]
"480" = [0.5, 5.0]
"720" = [1.5, 8.0]
"1080" = [3.0, 12.0]
"2160" = [6.0, 25.0]

# Per-profile size envelopes [target, bloat] keyed by the profile's target resolution.
[optimizer.topsis.size_envelope_by_profile."1080p Efficient"]
"1080" = [3.0, 12.0]

[optimizer.topsis.size_envelope_by_profile."2160p Efficient"]
"2160" = [6.0, 25.0]

[optimizer.topsis.size_envelope_by_profile."2160p Quality"]
"2160" = [12.0, 40.0]
