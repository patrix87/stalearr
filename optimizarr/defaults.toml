# optimizarr built-in defaults. Loaded as the base layer; the user's /config/config.toml is
# deep-merged on top. All tuning lives here (not in Python), so there are no magic values in
# the code. Do not edit in a deployment — override in config.toml instead.

dry_run = false

# ===== Unmonitor =====
[unmonitor]
enabled = true
cron_schedule = "0 4 * * *"
run_on_start = true

[unmonitor.radarr]
days = 30
release_type = "digitalRelease"
require_cutoff_met = true

[unmonitor.sonarr]
days = 30
release_type = "airDateUtc"
require_cutoff_met = true

# ===== Optimizer =====
[optimizer]
enabled = true
queue_max = 5
pick_order = "random"
process_interval_seconds = 15
list_refresh_minutes = 15
reevaluate_after_days = 30

# Per-app:
#   enabled                    toggle this app from the optimizer.
#   min_age_days               age threshold applied to every date in release_type.
#   release_type               LIST of date fields the age gate checks; ALL must be at least
#                              min_age_days old (so an item is only picked once it has been
#                              both released long enough AND on disk long enough). A missing
#                              date keeps the gate closed.
#   allow_size_increase        false -> drop candidates bigger than the current file (blocks
#                              resolution upgrades, since 1080p -> 2160p is always bigger).
#   allow_quality_downgrade    false -> drop candidates with a lower customFormatScore than
#                              the current file. WARNING: turning this off neutralizes
#                              size-leaning presets (Compact/Efficient), which deliberately
#                              swap a slightly-lower-score release for a much smaller one.
#   ignore_completed_in_queue  true -> items waiting for manual import don't count toward
#                              queue_max; only actively downloading/queued items do. Keeps
#                              the optimizer flowing when downgrades pile up unimported.
#   auto_import_downgrades     true -> the worker scans the queue each tick and force-imports
#                              completed items rejected solely for score regression
#                              ("Not an upgrade"). Other rejection categories (executable,
#                              sample, mismatch) are left untouched.
[optimizer.radarr]
enabled = true
min_age_days = 0
release_type = ["digitalRelease", "dateAdded"]
allow_size_increase = true
allow_quality_downgrade = true
ignore_completed_in_queue = true
auto_import_downgrades = true

[optimizer.sonarr]
enabled = true
min_age_days = 0
release_type = ["airDateUtc", "dateAdded"]
allow_size_increase = true
allow_quality_downgrade = true
ignore_completed_in_queue = true
auto_import_downgrades = true

# ===== TOPSIS =====
[optimizer.topsis]
score_ideal = 1000000
score_anti_ideal = 0
resolution_ideal = 2160          # fallback resolution target when a profile exposes none
resolution_anti_ideal = 480
# gap-cut inclusion: keep the top score cluster down to the first relative drop greater than this.
score_gap = 0.20
# Preset used when a profile name matches no preset by keyword.
default_preset = "Efficient"

# ----- Shared size reference (one objective set, used by ALL profiles) -----
# Realistic GiB/h per resolution (GB = 1024^3 -> GiB), HDR-assumed and deliberately lean (this
# is a space-saving tool). Profiles never aim ABOVE these.
#   - floor   : below this the encode is fake / too soft -> hard pre-filter drop.
#   - target  : a realistic good (HDR) release at this resolution.
#   - ceiling : above this is bloat; n_size reaches 0 here.
# Each profile's one-sided size curve: n_size = 1.0 at/below (size_aim * target), then ramps
# down to 0 at ceiling. Smaller than the aim is NEVER penalized -> nothing inflates a file.
[optimizer.topsis.reference]
"2160" = { floor = 3.0, target = 6.5, ceiling = 18 }
"1080" = { floor = 1.0, target = 2.5, ceiling = 8 }
"720"  = { floor = 0.4, target = 1.0, ceiling = 4 }
"480"  = { floor = 0.2, target = 0.5, ceiling = 3 }

# ----- Presets -----
# Each preset = TOPSIS weights (score/resolution/size, sum 1.0) + a relative `size_aim`
# (fraction of the reference target where its size curve plateaus) + a `pick` method
# (topsis | max_score | min_size) + a [.transitions] rule set (which moves from the current
# file are legal). Profiles attach to a preset whose name is a (case-insensitive) substring of
# the profile name; e.g. "2160p Quality" -> Quality, "2160p Remux" -> Remux. Add presets freely.
#
# transitions keys (defaults in parens):
#   score_slack (0.02) / score_much (0.10)  : |Δn_score| "same" band / "much" boundary.
#   size_slack (0.03)  / size_much (0.30)   : relative size "same" band / "much" boundary.
#   allow_bigger_for_score (true)           : may a bigger file be taken for a higher score?
#   bigger_needs_much_score (true)          : ...only if the gain clears score_much?
#   accept_score_drop (true)                : may a slightly-lower-score release be taken?
#   slight_drop_needs_much_smaller (false)  : ...only when it is *much* smaller?
#   accept_much_lower_score (false)         : may a much-lower-score release be taken (Compact)?
#   viability_score (0)                     : floor below which score drops are never taken.

[optimizer.topsis.presets.Remux]
# Untouched UHD/BluRay remux: score is everything, size barely weighs, never trade score away.
score = 0.80
resolution = 0.15
size = 0.05
size_aim = 1.0
pick = "max_score"
[optimizer.topsis.presets.Remux.transitions]
accept_score_drop = false        # never accept a lower-score release
bigger_needs_much_score = false  # any higher score justifies a bigger remux

[optimizer.topsis.presets.Quality]
# Max score, cares a little about size: takes a slightly-lower score only for a much smaller file.
score = 0.65
resolution = 0.15
size = 0.20
size_aim = 1.0
pick = "topsis"
[optimizer.topsis.presets.Quality.transitions]
slight_drop_needs_much_smaller = true

[optimizer.topsis.presets.Balanced]
# Good score AND smaller, leaning score.
score = 0.50
resolution = 0.10
size = 0.40
size_aim = 0.8
pick = "topsis"
[optimizer.topsis.presets.Balanced.transitions]

[optimizer.topsis.presets.Efficient]
# Good score AND smaller, leaning size.
score = 0.40
resolution = 0.10
size = 0.50
size_aim = 0.65
pick = "topsis"
[optimizer.topsis.presets.Efficient.transitions]

[optimizer.topsis.presets.Compact]
# Smallest viable: aims toward the floor, never a bigger file, accepts real score drops if the
# file is much smaller and still above viability_score.
score = 0.20
resolution = 0.10
size = 0.70
size_aim = 0.5
pick = "min_size"
[optimizer.topsis.presets.Compact.transitions]
allow_bigger_for_score = false
accept_much_lower_score = true
viability_score = 0

# Per-profile-name overrides. Reference a preset, or override weights / size_aim / pick:
# [optimizer.topsis.profiles."2160p Remux"]
# preset = "Remux"
# [optimizer.topsis.profiles."My Custom 1080p"]
# weights = { score = 0.5, resolution = 0.1, size = 0.4 }
# size_aim = 0.7
